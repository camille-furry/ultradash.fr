<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UltraDash Multi Lobby</title>
    <link rel="stylesheet" href="./css/menu.css" />
  </head>

  <body>
    <main id="menu" class="lobbyMenu">
      <h1>UltraDash</h1>
      <p class="subtitle">Rooms multi</p>

      <div class="roomCreateRow">
        <select id="roomModeSelect" aria-label="Mode de jeu">
          <option value="team3v3">3v3</option>
        </select>
        <input
          id="roomNameInput"
          type="text"
          maxlength="24"
          placeholder="Nom de room"
          autocomplete="off"
        />
        <button id="createRoomButton" type="button">Creer</button>
      </div>

      <div class="roomsHead">
        <strong>Rooms ouvertes</strong>
        <button id="refreshRoomsButton" type="button">Rafraichir</button>
      </div>

      <small id="maxPlayersLabel" class="subtitle"
        >6 joueurs max par room</small
      >
      <ul id="roomsList" class="roomsList"></ul>
      <p id="roomsEmpty" class="subtitle"></p>
      <p id="statusLine" class="statusLine" aria-live="polite"></p>
    </main>

    <script src="./src/lobby-common.js"></script>
    <script src="./src/menu.js"></script>
  </body>
</html>
